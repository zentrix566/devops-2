name: 飞书自建应用消息通知

on:
  push:
    branches: [main, master, develop]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      title:
        description: '消息标题'
        required: true
        default: '运维通知'
      content:
        description: '消息内容'
        required: true
        default: '工作流执行完成'
      status:
        description: '状态'
        required: true
        default: 'success'
        type: choice
        options:
          - success
          - failure
          - warning
          - info

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 配置
        uses: actions/checkout@v4

      - name: 发送飞书消息卡片
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          CONFIG: .github/config/message-templates.json
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          # 1. 获取 Token
          TOKEN=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${FEISHU_APP_ID}\",\"app_secret\":\"${FEISHU_APP_SECRET}\"}" \
            | grep -o '"tenant_access_token":"[^"]*"' | cut -d'"' -f4)

          [ -z "$TOKEN" ] && { echo "::error::获取 Token 失败"; exit 1; }

          # 2. 确定模板类型和样式
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ]; then
            TEMPLATE="push"
            STYLE="push"
          elif [ "$EVENT" = "schedule" ]; then
            TEMPLATE="schedule"
            STYLE="schedule"
          else
            TEMPLATE="manual"
            STYLE="${{ github.event.inputs.status }}"
          fi

          # 3. 读取配置
          COLOR=$(jq -r ".styles.\"${STYLE}\".color" "$CONFIG")
          ICON=$(jq -r ".styles.\"${STYLE}\".icon" "$CONFIG")
          TITLE=$(jq -r ".templates.\"${TEMPLATE}\".title" "$CONFIG")
          SUBTITLE=$(jq -r ".templates.\"${TEMPLATE}\".subtitle" "$CONFIG")

          # 4. 模板变量替换（使用 | 作为 sed 分隔符避免 / 冲突）
          TITLE=$(echo "$TITLE" | sed -e "s|{repository}|${REPO}|g" -e "s|{title}|${{ github.event.inputs.title }}|g")
          SUBTITLE=$(echo "$SUBTITLE" | sed -e "s|{repository}|${REPO}|g")

          # 5. 构建字段区域
          FIELDS_JSON=""
          FIELD_COUNT=$(jq ".templates.\"${TEMPLATE}\".fields | length" "$CONFIG")
          for i in $(seq 0 $((FIELD_COUNT - 1))); do
            LABEL=$(jq -r ".templates.\"${TEMPLATE}\".fields[$i].label" "$CONFIG")
            VALUE=$(jq -r ".templates.\"${TEMPLATE}\".fields[$i].value" "$CONFIG")
            VALUE=$(echo "$VALUE" | sed \
              -e "s|{repository}|${REPO}|g" \
              -e "s|{branch}|${BRANCH}|g" \
              -e "s|{actor}|${ACTOR}|g" \
              -e "s|{message}|${MESSAGE//\"/\\\"}|g" \
              -e "s|{content}|${{ github.event.inputs.content }}|g")
            FIELDS_JSON="${FIELDS_JSON}{\"tag\":\"div\",\"text\":{\"content\":\"**${LABEL}**\\n${VALUE}\",\"tag\":\"lark_md\"}},"
          done

          # 6. 构建按钮
          BUTTONS_JSON=""
          BUTTON_COUNT=$(jq ".templates.\"${TEMPLATE}\".buttons | length" "$CONFIG")
          for i in $(seq 0 $((BUTTON_COUNT - 1))); do
            BTN_TEXT=$(jq -r ".templates.\"${TEMPLATE}\".buttons[$i].text" "$CONFIG")
            BTN_URL=$(jq -r ".templates.\"${TEMPLATE}\".buttons[$i].url" "$CONFIG")
            BTN_URL=$(echo "$BTN_URL" | sed -e "s|{repository}|${REPO}|g" -e "s|{branch}|${BRANCH}|g")
            BUTTONS_JSON="${BUTTONS_JSON}{\"tag\":\"button\",\"text\":{\"content\":\"${BTN_TEXT}\",\"tag\":\"plain_text\"},\"type\":\"primary\",\"url\":\"${BTN_URL}\"},"
          done

          # 7. 构建卡片内容
          CARD_JSON='{"config":{"wide_screen_mode":true,"enable_forward":true},"header":{"template":"'"${COLOR}"'","title":{"content":"'"${ICON} ${TITLE}"'","tag":"plain_text"}},"elements":[{"tag":"div","text":{"content":"> '"${SUBTITLE}"'","tag":"lark_md"}},{"tag":"hr"},'"${FIELDS_JSON%,}"',{"tag":"hr"},{"tag":"action","actions":['"${BUTTONS_JSON%,}"']},{"tag":"note","elements":[{"tag":"plain_text","content":"📁 '"${REPO}"'  •  🕐 '"$(date '+%Y-%m-%d %H:%M:%S')"'"}]}]}'

          # 8. 发送消息
          RESPONSE=$(curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=chat_id" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"receive_id\":\"${FEISHU_CHAT_ID}\",\"msg_type\":\"interactive\",\"content\":$(echo "$CARD_JSON" | jq -c @json)}")

          echo "响应: $RESPONSE"
          echo "$RESPONSE" | grep -q '"code":0' && echo "发送成功！" || { echo "::error::发送失败"; exit 1; }
