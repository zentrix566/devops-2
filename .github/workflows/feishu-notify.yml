name: 飞书消息通知

on:
  workflow_dispatch:
    inputs:
      title:
        description: '消息标题'
        required: true
        default: 'GitHub Actions 通知'
      content:
        description: '消息内容（支持换行）'
        required: true
        default: '工作流执行成功'
      status:
        description: '状态'
        required: true
        default: 'success'
        type: choice
        options:
          - success
          - failure
          - warning
          - info

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - name: 发送飞书消息卡片
        env:
          FEISHU_ID: ${{ secrets.FEISHU_ID }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: |
          TIMESTAMP=$(date +%s)
          SIGN=$(echo -en "${TIMESTAMP}\n${FEISHU_SECRET}" | openssl dgst -sha256 -hmac "${FEISHU_SECRET}" -binary | base64)

          case "${{ github.event.inputs.status }}" in
            success) COLOR="green"; ICON="✅" ;;
            failure) COLOR="red"; ICON="❌" ;;
            warning) COLOR="yellow"; ICON="⚠️" ;;
            info) COLOR="blue"; ICON="ℹ️" ;;
          esac

          curl -s -X POST "https://open.feishu.cn/open-apis/bot/v2/hook/${FEISHU_ID}" \
            -H "Content-Type: application/json" \
            -d '{
              "timestamp": "'"${TIMESTAMP}"'",
              "sign": "'"${SIGN}"'",
              "msg_type": "interactive",
              "card": {
                "config": {"wide_screen_mode": true},
                "header": {
                  "template": "'"${COLOR}"'",
                  "title": {"content": "'"${ICON} ${{ github.event.inputs.title }}"'", "tag": "plain_text"}
                },
                "elements": [
                  {"tag": "div", "text": {"content": "${{ github.event.inputs.content }}", "tag": "lark_md"}},
                  {"tag": "hr"},
                  {"tag": "note", "elements": [{"tag": "plain_text", "content": "发送时间: '"$(date '+%Y-%m-%d %H:%M:%S')"'"}]}
                ]
              }
            }'
